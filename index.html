<!DOCTYPE html>
<html lang="vi">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Báo Cáo Sự Cố IT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
 
  <!-- ========== HEADER ========== -->
  <div class="header">
    <div class="header-emoji" id="headerLogo">🏢</div>
    <h3 id="headerCompany">IT School</h3>
    <p id="headerApp">Báo Cáo Sự Cố IT</p>
  </div>

  <!-- ========== CARD THIẾT BỊ ========== -->
  <div id="devCard" style="display:none;">
    <div class="dev-title">✅ Xác nhận thiết bị</div>
    <div id="infoName" class="dev-name">Đang tải...</div>
    <div id="infoRoom" class="dev-room">...</div>
  </div>

  <!-- ========== FORM SCREEN ========== -->
  <div id="formScreen" class="form-box">
    <form id="issueForm" onsubmit="handleSubmit(event)">
     
      <!-- Mã thiết bị -->
      <div class="form-group">
        <label for="idMay">Mã Thiết Bị <span style="color:red;">*</span></label>
        <input type="text" id="idMay" class="input-field" placeholder="VD: OPS-001" required onkeyup="checkDeviceDelay(this.value)">
        <span id="checkStatus" class="status-text"></span>
      </div>

      <!-- Quick actions -->
      <div class="quick-actions">
        <button type="button" class="q-btn" onclick="addText('Không bật được máy')">❌ Không bật được</button>
        <button type="button" class="q-btn" onclick="addText('Mạng chậm')">🐢 Mạng chậm</button>
        <button type="button" class="q-btn" onclick="addText('Màn hình đen')">🖥️ Màn hình đen</button>
        <button type="button" class="q-btn" onclick="addText('Không kết nối wifi')">📡 Không wifi</button>
      </div>

      <!-- Người báo cáo -->
      <div class="form-group">
        <label for="nguoiBao">Người Báo Cáo <span style="color:red;">*</span></label>
        <input type="text" id="nguoiBao" class="input-field" placeholder="Nhập tên của bạn" required>
      </div>

      <!-- Mô tả sự cố -->
      <div class="form-group">
        <label for="moTa">Mô Tả Sự Cố <span style="color:red;">*</span></label>
        <textarea id="moTa" class="input-field" placeholder="Mô tả chi tiết vấn đề..." required></textarea>
      </div>

      <!-- Upload ảnh -->
      <div class="form-group">
        <label>Hình Ảnh (Tùy Chọn)</label>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
          <div id="uploadPlaceholder">📸 Chạm để chọn ảnh</div>
          <img id="previewImg" style="display:none; max-width:100%; border-radius:8px;">
        </div>
        <input type="file" id="fileInput" style="display:none;" accept="image/*" onchange="handleFileSelect(event)">
      </div>

      <!-- Nút submit -->
      <button type="submit" class="btn-submit" id="btnSend">GỬI YÊU CẦU NGAY</button>
    </form>

    <!-- Danh sách nhân viên trực ban -->
    <div id="teamBoxContainer"></div>
   
    <!-- Thông tin liên hệ -->
    <div id="contactInfo" style="text-align:center; font-size:0.75rem; font-weight:700; color:var(--p); margin-top:20px;">
    </div>
  </div>

  <!-- ========== SUCCESS SCREEN ========== -->
  <div id="successScreen" style="display:none;">
    <div class="check-circle">
      <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
        <path d="M20 6L9 17l-5-5"></path>
      </svg>
    </div>
    <h2 style="margin-bottom:10px; color:#0f172a">Đã Gửi Thành Công!</h2>
    <p style="color:#64748b; font-size:0.9rem; margin-bottom:30px">Hệ thống AI đã tiếp nhận và đang điều phối Kỹ thuật viên xử lý.</p>
    <button class="btn-submit" style="background:#fff; color:var(--p); border:2px solid var(--p);" onclick="handleResetForm()">Gửi phiếu khác</button>
  </div>

</div>

<!-- Scripts -->
<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
